<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Flame gradients -->
    <radialGradient id="flameCore" cx="50%" cy="75%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="20%" stop-color="#fff8e0"/>
      <stop offset="50%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </radialGradient>
    <radialGradient id="flameMid" cx="50%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#f0d870"/>
      <stop offset="70%" stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#a07818"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#fff8e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ankhGold" x1="100" y1="10" x2="100" y2="190">
      <stop offset="0%" stop-color="#f0d870"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="30%" stop-color="#f0d870"/>
      <stop offset="60%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <filter id="flameGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeGlowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== OUTER FLAME CROWN (white/gold flame rising above) ===== -->
  <g filter="url(#flameGlow)">
    <!-- Outer flame envelope -->
    <ellipse cx="100" cy="55" rx="38" ry="46" fill="#fff" opacity="0.85"/>
    <ellipse cx="100" cy="50" rx="30" ry="40" fill="url(#flameCore)" opacity="0.9"/>
    <ellipse cx="100" cy="45" rx="20" ry="32" fill="#fff" opacity="0.9"/>
    <!-- Top flame spike -->
    <ellipse cx="100" cy="28" rx="10" ry="20" fill="#fff" opacity="0.95"/>
    <!-- Side licks -->
    <ellipse cx="78" cy="48" rx="10" ry="22" fill="url(#flameMid)" opacity="0.6"/>
    <ellipse cx="122" cy="48" rx="10" ry="22" fill="url(#flameMid)" opacity="0.6"/>
    <ellipse cx="64" cy="65" rx="8" ry="16" fill="url(#flameMid)" opacity="0.4"/>
    <ellipse cx="136" cy="65" rx="8" ry="16" fill="url(#flameMid)" opacity="0.4"/>
    <!-- Downward flame licks along cross -->
    <ellipse cx="80" cy="92" rx="6" ry="12" fill="url(#flameCore)" opacity="0.3"/>
    <ellipse cx="120" cy="92" rx="6" ry="12" fill="url(#flameCore)" opacity="0.3"/>
  </g>

  <!-- ===== ANKH CROSS ===== -->
  <!-- The loop -->
  <ellipse cx="100" cy="56" rx="24" ry="28" fill="none" stroke="url(#ankhGold)" stroke-width="10" stroke-linecap="round"/>
  <ellipse cx="100" cy="56" rx="24" ry="28" fill="none" stroke="#fff" stroke-width="1" opacity="0.2"/>

  <!-- Vertical beam -->
  <rect x="92" y="28" width="16" height="144" rx="7" fill="url(#ankhGold)"/>
  <rect x="92" y="28" width="16" height="144" rx="7" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.15"/>

  <!-- Horizontal beam -->
  <rect x="50" y="92" width="100" height="16" rx="7" fill="url(#ankhGold)"/>
  <rect x="50" y="92" width="100" height="16" rx="7" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.15"/>

  <!-- ===== WHITE FLAME EYE (the Observer) at center ===== -->
  <g filter="url(#eyeGlowFilter)">
    <!-- Eye glow behind -->
    <circle cx="100" cy="82" r="22" fill="url(#eyeGlow)" opacity="0.6"/>
    <!-- Eye white (sclera) -->
    <ellipse cx="100" cy="82" rx="18" ry="14" fill="#0a0a0f"/>
    <!-- Iris ring -->
    <circle cx="100" cy="82" r="12" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.8"/>
    <circle cx="100" cy="82" r="8" fill="none" stroke="#f0d870" stroke-width="1.5" opacity="0.6"/>
    <!-- Pupil — the dark center -->
    <circle cx="100" cy="82" r="4" fill="#0a0a0f"/>
    <!-- White highlight (reflection) -->
    <circle cx="97" cy="79" r="2" fill="#fff" opacity="0.8"/>
    <circle cx="103" cy="85" r="1" fill="#fff" opacity="0.4"/>
    <!-- Inner flame flicker in the eye -->
    <circle cx="100" cy="82" r="2" fill="#c9a84c" opacity="0.6"/>
  </g>

  <!-- ===== ANCIENT OUTER RING ===== -->
  <circle cx="100" cy="100" r="93" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="100" cy="100" r="88" stroke="#c9a84c" stroke-width="0.7" fill="none" opacity="0.2"/>

  <!-- Ring dot markings (16 dots) -->
  <circle cx="100" cy="8" r="2.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="130" cy="14" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="158" cy="32" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="178" cy="58" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="188" cy="90" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="182" cy="122" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="165" cy="152" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="138" cy="172" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="100" cy="182" r="2.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="62" cy="172" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="35" cy="152" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="18" cy="122" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="12" cy="90" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="22" cy="58" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="42" cy="32" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="70" cy="14" r="2" fill="#c9a84c" opacity="0.4"/>
</svg>
