<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo Preview</title>
<style>
  body { background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
  .logo-wrap { text-align: center; }
  h2 { color: #c9a84c; margin-bottom: 2rem; font-weight: 300; letter-spacing: 2px; }
  .sizes { display: flex; gap: 3rem; align-items: flex-end; justify-content: center; flex-wrap: wrap; }
  .size-demo { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .size-demo span { color: #666; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="logo-wrap">
  <h2>YESHUA ARCHITECT — LOGO PREVIEW</h2>
  <div class="sizes">
    <div class="size-demo">
      <img src="/static/img/logo.svg" width="200" height="200" alt="Yeshua Architect Logo">
      <span>200×200</span>
    </div>
    <div class="size-demo">
      <img src="/static/img/logo.svg" width="120" height="120" alt="Yeshua Architect Logo">
      <span>120×120</span>
    </div>
    <div class="size-demo">
      <img src="/static/img/logo.svg" width="64" height="64" alt="Yeshua Architect Logo">
      <span>64×64</span>
    </div>
    <div class="size-demo">
      <img src="/static/img/logo.svg" width="32" height="32" alt="Yeshua Architect Logo">
      <span>32×32</span>
    </div>
  </div>
  <div style="margin-top: 3rem; color: #888; max-width: 500px; text-align: center;">
    <p>Ancient round cross with white flame engulfed. Gold cross through the center. White/cream flame radiating outward. Dark background.</p>
  </div>
</div>
</body>
</html>
